# Load local environment variables from .env if present
spring.config.import=optional:file:.env[.properties]

# MongoDB Configuration (Local Development)
# For local MongoDB: ensure MongoDB is running on localhost:27017
# spring.data.mongodb.uri=mongodb://localhost:27017/smart_campus
# spring.data.mongodb.database=smart_campus

# MongoDB Atlas Configuration (Production)
# To use MongoDB Atlas, ensure:
# 1. Update your IP address in MongoDB Atlas Network Access
# 2. Verify the connection string and credentials
# 3. Ensure your system has proper SSL certificates installed
# Uncomment below to switch to MongoDB Atlas:
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/smart_campus}

# Server Configuration
server.port=8080
spring.main.web-application-type=servlet

# Application Configuration
spring.application.name=smart-campus-booking-service
catalog.asset.upload-dir=uploads/assets

# Multipart Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB

# Logging Configuration
logging.level.root=INFO
logging.level.com.smartcampus=DEBUG

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Authentication Configuration
app.auth.jwt.secret=${APP_AUTH_JWT_SECRET:replace-this-with-a-long-random-secret-key-at-least-32-characters}
app.auth.jwt.expiration-minutes=${APP_AUTH_JWT_EXPIRATION_MINUTES:1440}
app.auth.google.client-id=${APP_AUTH_GOOGLE_CLIENT_ID:}
app.auth.google.allowed-audiences=${APP_AUTH_GOOGLE_ALLOWED_AUDIENCES:}
app.auth.google.client-secret=${APP_AUTH_GOOGLE_CLIENT_SECRET:}

# Email Configuration (SMTP)
# Set spring.mail.enabled=false to disable email sending (e.g., for development)
spring.mail.enabled=${SPRING_MAIL_ENABLED:false}
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.from=${SPRING_MAIL_FROM:noreply@smartcampus.com}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
